<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Vision Lab</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<style>
* { margin:0; padding:0; box-sizing:border-box }
html, body { height:100%; background:#000; overflow:hidden }
iframe { position:fixed; inset:0; width:100%; height:100%; border:0 }
</style>
</head>
<body>
  <iframe
    id="f"
    src="https://embed.pitchdeck.hypermatic.com/slides/mq10ez1ae0r0e/?token=MVVzdG9CMXlFMVdlJWI=&b=000000&f=000000&t=s&toolbar=hide"
    allow="autoplay; fullscreen; encrypted-media"
    allowfullscreen></iframe>
  <script>
    var f = document.getElementById('f');
    // Автофокус при загрузке — стрелки сразу работают на десктопе
    window.addEventListener('load', function(){ f.focus(); });
    // Клик по чёрным полосам (снаружи слайда) — возвращает фокус плееру
    // Если стрелки стали мотать видео — кликни в чёрную область рядом со слайдом
    document.addEventListener('click', function(){ f.focus(); });
  </script>
</body>
</html>
